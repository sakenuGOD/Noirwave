name: Noirwave

options:
  bundleIdPrefix: com.fsociety
  createIntermediateGroups: true
  deploymentTarget:
    macOS: "15.0"

settings:
  base:
    SWIFT_VERSION: 6.0
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    DEAD_CODE_STRIPPING: YES

targets:
  Noirwave:
    type: application
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: Noirwave
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fsociety.noirwave
        PRODUCT_NAME: Noirwave
        MARKETING_VERSION: 0.1.0
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Noirwave
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.music
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES

  NoirwaveTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: NoirwaveTests
    dependencies:
      - target: Noirwave
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
